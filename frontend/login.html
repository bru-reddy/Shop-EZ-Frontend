<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Login - ShopEZ</title><link rel="stylesheet" href="css/style.css"></head>
<body>
<nav id="nav"></nav>
<div class="container">
  <div class="card" style="max-width:400px;margin:auto;">
    <h2>Login</h2>
    <div id="msg"></div>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p style="margin-top:10px;">No account? <a href="register.html">Register</a></p>
  </div>
</div>
<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script>
async function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const msg = document.getElementById('msg');
  try {
    const data = await apiRequest('/users/login', 'POST', { email, password });
    setToken(data.token);
    window.location.href = 'index.html';
  } catch (err) {
    msg.innerHTML = `<p class="error">${err.message}</p>`;
  }
}
</script>
</body>
</html>
